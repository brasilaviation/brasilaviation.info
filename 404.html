<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de voo não encontrado (404) | BrasilAviation.info</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    
    <style>
        :root {
            --primary: #1a237e; --secondary: #2e7d32; --bg: #f4f7f6;
            --text-main: #1c1c1c; --text-muted: #757575;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            transition: 0.3s;
        }
        body.dark-mode { --bg: #121212; --text-main: #f0f0f0; --text-muted: #aaa; }

        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo-site {
            max-width: 180px;
            margin-bottom: 40px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -5px;
        }
        body.dark-mode .error-code { color: #fff; }

        .error-icon {
            font-size: 50px;
            color: var(--secondary);
            margin-bottom: 20px;
            animation: plane-bounce 2s infinite ease-in-out;
        }

        h2 { font-size: 24px; margin-bottom: 15px; }
        p { color: var(--text-muted); max-width: 450px; margin-bottom: 30px; font-size: 16px; }

        .btn-home {
            background-color: var(--primary);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(26, 35, 126, 0.3);
            background-color: #0d145a;
        }

        @keyframes plane-bounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
    </style>
</head>
<body>

<script>
    // Mantém o Dark Mode consistente
    if (localStorage.getItem('theme') === 'dark' || localStorage.getItem('dark-mode') === 'active') {
        document.body.classList.add('dark-mode');
    }
</script>

<div class="error-container">
    <a href="/index.html">
        <img src="/logobrasilaviation.info.png" alt="BrasilAviation.info" class="logo-site">
    </a>

    <div class="error-icon">
        <i class="fas fa-plane-slash"></i>
    </div>
    
    <h1 class="error-code">404</h1>
    <h2>Ops! Fora da rota.</h2>
    <p>O plano de voo para esta página não foi encontrado. Talvez a notícia tenha mudado de hangar ou o link esteja incorreto.</p>

    <a href="/index.html" class="btn-home">
        <i class="fas fa-home"></i> Voltar para a Base
    </a>
</div>

</body>
</html>
