<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Plano de Voo Perdido | Brasil Aviation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #001242; --accent: #0056b3; --white: #ffffff; }
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center; 
            color: var(--primary);
        }
        .container { padding: 20px; max-width: 500px; }
        .icon { font-size: 80px; color: var(--accent); margin-bottom: 20px; }
        h1 { font-size: 100px; margin: 0; line-height: 1; }
        h2 { font-size: 24px; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .btn-home { 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            padding: 15px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            transition: 0.3s;
            display: inline-block;
        }
        .btn-home:hover { background: var(--accent); transform: scale(1.05); }
        .plane-animation {
            animation: fly 3s infinite ease-in-out;
            display: inline-block;
        }
        @keyframes fly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="plane-animation">
            <i class="fas fa-plane-departure icon"></i>
        </div>
        <h1>404</h1>
        <h2>Ops! Plano de voo não encontrado.</h2>
        <p>A página que você está procurando saiu da rota ou não existe mais. Mas não se preocupe, podemos te levar de volta para a pista principal.</p>
        
        <a href="index.html" class="btn-home">
            <i class="fas fa-home"></i> VOLTAR PARA A HOME
        </a>
    </div>

</body>
</html>
