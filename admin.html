<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Brasil Aviation | ImgBB Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --bg: #f4f7f6; --card: #ffffff; --text: #333; }
        body.dark-mode { --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 650px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-top { background: var(--card); border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; color: var(--text); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--secondary); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .card-news { background: var(--card); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-news img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        #editor-noticia { display: none; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        label { display: block; font-weight: bold; font-size: 11px; text-transform: uppercase; margin: 15px 0 5px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .toolbar { display: flex; gap: 5px; background: #eee; padding: 8px; border-radius: 10px 10px 0 0; border: 1px solid #ddd; border-bottom: none; margin-top: 10px; }
        .toolbar button { background: white; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; border-radius: 5px; }
        textarea { height: 250px; border-radius: 0 0 10px 10px; resize: vertical; }
        #status-txt { font-size: 12px; color: var(--secondary); font-weight: bold; display: none; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn-top" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
        <div style="display:flex; gap:8px;">
            <button class="btn-top" id="dark-btn"><i class="fas fa-moon"></i></button>
            <button class="btn-top" id="logout-btn" style="color:red;">Sair</button>
        </div>
    </div>

    <div id="lista-posts">
        <div class="stats">
            <div class="stat-card"><h1 id="total-m">0</h1><p style="margin:0;font-size:12px;">Matérias</p></div>
            <div class="stat-card"><h1 id="total-c">0</h1><p style="margin:0;font-size:12px;">Cliques</p></div>
        </div>
        <input type="text" id="busca" class="search-bar" placeholder="Pesquisar título...">
        <button class="btn-main" onclick="abrirEditor()"><i class="fas fa-plus"></i> Nova Matéria</button>
        <div id="feed"></div>
    </div>

    <div id="editor-noticia">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="edit-title" style="margin:0; font-size:18px;">Publicar Notícia</h2>
            <i class="fas fa-times" onclick="fecharEditor()" style="cursor:pointer; color:#999;"></i>
        </div>

        <input type="hidden" id="p-id">
        <input type="hidden" id="p-foto-velha">

        <label>Título:</label>
        <input type="text" id="p-titulo">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>
                <label>Categoria:</label>
                <select id="p-cat">
                    <option value="AZUL">Azul</option>
                    <option value="GOL">GOL</option>
                    <option value="LATAM">LATAM</option>
                    <option value="FROTA">Frota</option>
                    <option value="ROTAS">Rotas</option>
                    <option value="PINTURA">Pintura</option>
                </select>
            </div>
            <div>
                <label>Autor:</label>
                <select id="p-autor">
                    <option value="Miguel Barbosa">Miguel Barbosa</option>
                    <option value="BrasilAviation Team">BrasilAviation Team</option>
                </select>
            </div>
        </div>

        <label>Capa da Notícia:</label>
        <input type="file" id="p-file" accept="image/*">
        <input type="text" id="p-legenda" placeholder="Legenda da capa" style="margin-top:5px;">

        <label>Texto da Matéria (Use as tags para formatar):</label>
        <div class="toolbar">
            <button onclick="format('bold')"><b>B</b></button>
            <button onclick="format('italic')"><i>I</i></button>
            <button onclick="addLink()">Link</button>
            <button onclick="document.getElementById('p-file-extra').click()" style="background:#e8f5e9;">+ Foto Interna</button>
            <input type="file" id="p-file-extra" accept="image/*" style="display:none" onchange="uploadExtra(this)">
        </div>
        <textarea id="p-texto"></textarea>
        
        <div id="status-txt"><i class="fas fa-plane fa-spin"></i> Processando voo, aguarde...</div>
        <button class="btn-main" id="btn-save" style="margin-top:20px;">PUBLICAR AGORA</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, addDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    // CHAVE IMGBB ATIVADA
    const IMGBB_API_KEY = "2ee4c2239a809ffb30ec9c04689ee3ee"; 

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let noticias = [];

    // Função que faz o upload para o ImgBB
    async function subirImg(arquivo) {
        const formData = new FormData();
        formData.append("image", arquivo);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
            method: "POST",
            body: formData
        });
        const data = await res.json();
        if(!data.success) throw new Error("Erro no ImgBB: " + data.status);
        return data.data.url;
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else carregar();
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth);

    async function carregar() {
        const q = query(collection(db, "noticias"), orderBy("data", "desc"));
        const snap = await getDocs(q);
        noticias = [];
        let clks = 0;
        snap.forEach(d => {
            const data = d.data();
            data.id = d.id;
            noticias.push(data);
            clks += (data.cliques || 0);
        });
        render(noticias);
        document.getElementById('total-m').innerText = noticias.length;
        document.getElementById('total-c').innerText = clks;
    }

    function render(lista) {
        let h = "";
        lista.forEach(n => {
            h += `<div class="card-news">
                <img src="${n.foto}">
                <div style="flex:1;"><h3>${n.titulo}</h3><p style="font-size:10px;margin:0;">${n.categoria}</p></div>
                <i class="fas fa-edit" onclick="abrirEditor('${n.id}')" style="cursor:pointer;color:var(--primary);"></i>
                <i class="fas fa-trash" onclick="deletar('${n.id}')" style="cursor:pointer;color:red;margin-left:10px;"></i>
            </div>`;
        });
        document.getElementById('feed').innerHTML = h || "<p>Nenhuma matéria encontrada.</p>";
    }

    window.abrirEditor = async (id = null) => {
        document.getElementById('lista-posts').style.display = 'none';
        document.getElementById('editor-noticia').style.display = 'block';
        if(id) {
            const s = await getDoc(doc(db, "noticias", id));
            const n = s.data();
            document.getElementById('p-id').value = id;
            document.getElementById('p-titulo').value = n.titulo;
            document.getElementById('p-texto').value = n.conteudo || n.texto || "";
            document.getElementById('p-foto-velha').value = n.foto;
            document.getElementById('p-legenda').value = n.legenda || "";
            document.getElementById('edit-title').innerText = "Editar Matéria";
        } else {
            document.getElementById('p-id').value = "";
            document.getElementById('p-titulo').value = "";
            document.getElementById('p-texto').value = "";
            document.getElementById('p-foto-velha').value = "";
            document.getElementById('p-legenda').value = "";
            document.getElementById('edit-title').innerText = "Nova Matéria";
        }
    };

    window.fecharEditor = () => {
        document.getElementById('lista-posts').style.display = 'block';
        document.getElementById('editor-noticia').style.display = 'none';
    };

    window.deletar = async (id) => {
        if(confirm("Deseja apagar definitivamente?")) { await deleteDoc(doc(db, "noticias", id)); carregar(); }
    };

    window.uploadExtra = async (input) => {
        const file = input.files[0];
        if(!file) return;
        document.getElementById('status-txt').style.display = 'block';
        try {
            const url = await subirImg(file);
            document.getElementById('p-texto').value += `\n<img src="${url}" style="width:100%; border-radius:10px; margin:10px 0;">\n`;
        } catch(e) { alert("Falha no upload da imagem interna."); }
        document.getElementById('status-txt').style.display = 'none';
    };

    document.getElementById('btn-save').onclick = async () => {
        const id = document.getElementById('p-id').value;
        const file = document.getElementById('p-file').files[0];
        let url = document.getElementById('p-foto-velha').value;

        if(!url && !file) return alert("A notícia precisa de uma foto de capa!");

        document.getElementById('status-txt').style.display = 'block';
        try {
            if(file) url = await subirImg(file);

            const dados = {
                titulo: document.getElementById('p-titulo').value,
                categoria: document.getElementById('p-cat').value,
                autor: document.getElementById('p-autor').value,
                foto: url,
                legenda: document.getElementById('p-legenda').value,
                conteudo: document.getElementById('p-texto').value,
                data: serverTimestamp()
            };

            if(id) await setDoc(doc(db, "noticias", id), dados, {merge:true});
            else { dados.cliques = 0; await addDoc(collection(db, "noticias"), dados); }
            
            alert("Publicado com sucesso!");
            fecharEditor(); carregar();
        } catch (e) { alert("Erro ao publicar: " + e.message); }
        document.getElementById('status-txt').style.display = 'none';
    };

    document.getElementById('busca').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        render(noticias.filter(n => n.titulo.toLowerCase().includes(t)));
    };

    window.format = (type) => {
        const area = document.getElementById('p-texto');
        const start = area.selectionStart;
        const end = area.selectionEnd;
        const sel = area.value.substring(start, end);
        let novo = sel;
        if(type === 'bold') novo = `<b>${sel}</b>`;
        if(type === 'italic') novo = `<i>${sel}</i>`;
        area.value = area.value.substring(0, start) + novo + area.value.substring(end);
        area.focus();
    };

    window.addLink = () => {
        const url = prompt("Cole o link (ex: https://...):");
        if(url) {
            const area = document.getElementById('p-texto');
            area.value += `<a href="${url}" target="_blank">Clique aqui</a>`;
        }
    };

    const btnD = document.getElementById('dark-btn');
    if(localStorage.getItem('dark') === 'on') document.body.classList.add('dark-mode');
    btnD.onclick = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark', document.body.classList.contains('dark-mode') ? 'on' : 'off');
    };
</script>
</body>
</html>
