<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Brasil Aviation | Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --bg: #f4f7f6; --card: #ffffff; --text: #333; }
        body.dark-mode { --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        /* TELA DE LOGIN */
        #login-screen { max-width: 350px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #login-screen img { height: 50px; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; background: var(--bg); color: var(--text); }
        
        /* PAINEL (Oculto até logar) */
        #main-content { display: none; }
        
        .container { max-width: 650px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-top { background: var(--card); border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; color: var(--text); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--secondary); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .card-news { background: var(--card); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-news img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        
        #editor-noticia { display: none; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 50px; }
        label { display: block; font-weight: bold; font-size: 11px; text-transform: uppercase; margin: 15px 0 5px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 5px; background: #eee; padding: 8px; border-radius: 10px 10px 0 0; border: 1px solid #ddd; border-bottom: none; margin-top: 10px; }
        #p-texto { min-height: 300px; border: 1px solid #ddd; border-radius: 0 0 10px 10px; background: var(--bg); color: var(--text); padding: 15px; overflow-y: auto; outline: none; }
        #status-txt { font-size: 12px; color: var(--secondary); font-weight: bold; display: none; margin: 10px 0; }
    </style>
</head>
<body>

<div id="login-screen">
    <img src="3_20250925_005418_0002.png">
    <h3>Acesso Restrito</h3>
    <input type="email" id="email-login" class="login-input" placeholder="E-mail">
    <input type="password" id="pass-login" class="login-input" placeholder="Senha">
    <button class="btn-main" id="btn-do-login">ENTRAR NO SISTEMA</button>
    <p id="error-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
</div>

<div id="main-content">
    <div class="container">
        <div class="header">
            <button class="btn-top" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
            <div style="display:flex; gap:8px;">
                <button class="btn-top" id="dark-btn"><i class="fas fa-moon"></i></button>
                <button class="btn-top" id="logout-btn" style="color:red;">Sair</button>
            </div>
        </div>

        <div id="lista-posts">
            <div class="stats">
                <div class="stat-card"><h1 id="total-m">0</h1><p style="margin:0;font-size:12px;">Matérias</p></div>
                <div class="stat-card"><h1 id="total-c">0</h1><p style="margin:0;font-size:12px;">Cliques</p></div>
            </div>
            <input type="text" id="busca" class="search-bar" placeholder="Pesquisar título...">
            <button class="btn-main" onclick="abrirEditor()"><i class="fas fa-plus"></i> Nova Matéria</button>
            <div id="feed"></div>
        </div>

        <div id="editor-noticia">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="edit-title" style="margin:0; font-size:18px;">Publicar Notícia</h2>
                <i class="fas fa-times" onclick="fecharEditor()" style="cursor:pointer; color:#999;"></i>
            </div>
            <input type="hidden" id="p-id"><input type="hidden" id="p-foto-velha">
            <label>Título da Matéria:</label>
            <input type="text" id="p-titulo" oninput="gerarSlugAuto(this.value)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Categoria:</label><select id="p-cat"><option value="AZUL">Azul</option><option value="GOL">GOL</option><option value="LATAM">LATAM</option><option value="FROTA">Frota</option><option value="ROTAS">Rotas</option><option value="PINTURA">Pintura</option></select></div>
                <div><label>Autor:</label><select id="p-autor"><option value="Miguel Barbosa">Miguel Barbosa</option><option value="BrasilAviation Team">BrasilAviation Team</option></select></div>
            </div>
            <label>Capa:</label><input type="file" id="p-file" accept="image/*">
            <div class="toolbar"><button onclick="execCmd('bold')">B</button></div>
            <div id="p-texto" contenteditable="true"></div>
            <input type="text" id="p-slug" placeholder="Slug">
            <div id="status-txt">Processando...</div>
            <button class="btn-main" id="btn-save" style="margin-top:20px;">PUBLICAR</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, setDoc, addDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const IMGBB_API_KEY = "2ee4c2239a809ffb30ec9c04689ee3ee"; 
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // LÓGICA DE LOGIN
    document.getElementById('btn-do-login').onclick = async () => {
        const e = document.getElementById('email-login').value;
        const p = document.getElementById('pass-login').value;
        try {
            await signInWithEmailAndPassword(auth, e, p);
        } catch(err) {
            document.getElementById('error-msg').innerText = "Usuário ou senha inválidos.";
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            carregar();
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        }
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth);

    // RESTO DO SEU SCRIPT ORIGINAL (Carregar, Salvar, Editar, etc.)
    let noticias = [];
    window.gerarSlugAuto = (texto) => {
        const slug = texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
        document.getElementById('p-slug').value = slug;
    };

    async function carregar() {
        const q = query(collection(db, "noticias"), orderBy("data", "desc"));
        const snap = await getDocs(q);
        noticias = []; let clks = 0;
        snap.forEach(d => {
            const data = d.data(); data.id = d.id;
            noticias.push(data); clks += (data.cliques || 0);
        });
        render(noticias);
        document.getElementById('total-m').innerText = noticias.length;
        document.getElementById('total-c').innerText = clks;
    }

    function render(lista) {
        let h = "";
        lista.forEach(n => {
            h += `<div class="card-news"><img src="${n.foto}"><div style="flex:1;"><h3>${n.titulo}</h3></div><i class="fas fa-edit" onclick="abrirEditor('${n.id}')"></i></div>`;
        });
        document.getElementById('feed').innerHTML = h;
    }

    window.abrirEditor = async (id = null) => {
        document.getElementById('lista-posts').style.display = 'none';
        document.getElementById('editor-noticia').style.display = 'block';
        if(id) { /* lógica de carregar para editar */ }
    };

    window.fecharEditor = () => {
        document.getElementById('lista-posts').style.display = 'block';
        document.getElementById('editor-noticia').style.display = 'none';
    };
    
    // ... continue com o restante das suas funções de salvar e deletar conforme o original
</script>
</body>
</html>
