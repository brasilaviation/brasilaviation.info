<style>
    header { 
        display: flex; justify-content: space-between; align-items: center; 
        padding: 10px 15px; background: #fff; border-bottom: 1px solid #eee;
        position: sticky; top: 0; z-index: 1000; height: 60px;
    }
    body.dark-mode header { border-color: #333; background: #121212; }

    .search-container { 
        display: flex; align-items: center; justify-content: flex-end;
        position: relative; border: 1.5px solid #2e7d32; 
        border-radius: 25px; transition: 0.4s; width: 38px; height: 38px; 
        overflow: hidden; background: transparent;
    }
    .search-container.active { width: 190px; background: #fff; }
    body.dark-mode .search-container.active { background: #121212; }

    .search-input { 
        border: none; background: transparent; outline: none; 
        width: 0; font-size: 14px; color: inherit; padding: 0;
    }
    .search-container.active .search-input { width: 100%; padding: 0 10px 0 15px; }
    
    .btn-header { 
        background: none; border: none; cursor: pointer; color: #2e7d32; 
        display: flex; align-items: center; justify-content: center; 
        padding: 0; min-width: 38px; height: 38px; font-size: 20px;
    }
    .site-logo { height: 35px; cursor: pointer; }
</style>

<header>
    <button class="btn-header" id="open-menu"><i class="fas fa-bars"></i></button>
    <img src="/3_20250925_005418_0002.png" class="site-logo" alt="BrasilAviation" onclick="location.href='/'">
    
    <div style="display: flex; gap: 5px; align-items: center;">
        <div class="search-container" id="search-box-header">
            <input type="text" id="input-busca-header" class="search-input" placeholder="Pesquisar...">
            <button class="btn-header" id="btn-lupa-header"><i class="fas fa-search"></i></button>
        </div>
        <button class="btn-header" id="dark-toggle-header"><i class="fas fa-moon"></i></button>
    </div>
</header>

<script>
    const searchBox = document.getElementById('search-box-header');
    const searchInput = document.getElementById('input-busca-header');
    const btnLupa = document.getElementById('btn-lupa-header');

    btnLupa.addEventListener('click', () => {
        if (!searchBox.classList.contains('active')) {
            searchBox.classList.add('active');
            searchInput.focus();
        } else {
            const termo = searchInput.value.trim();
            if (termo) {
                window.location.href = `/pesquisa?q=${encodeURIComponent(termo)}`;
            } else {
                searchBox.classList.remove('active');
            }
        }
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const termo = searchInput.value.trim();
            if (termo) window.location.href = `/pesquisa?q=${encodeURIComponent(termo)}`;
        }
    });
</script>
