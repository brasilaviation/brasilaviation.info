<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation | Categorias</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .feed-container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .categoria-header { 
            padding: 25px 15px; 
            background: #ffffff; 
            border-bottom: 4px solid #2e7d32; 
            margin-bottom: 20px;
            text-align: center;
        }
        .categoria-header h2 { color: #1a237e; text-transform: uppercase; font-size: 20px; margin: 0; }
        
        .news-item {
            display: flex; gap: 15px; background: white; padding: 12px;
            border-radius: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer;
        }
        .news-photo img { width: 110px; height: 80px; border-radius: 10px; object-fit: cover; }
        .news-info h3 { font-size: 15px; margin: 0 0 5px 0; color: #222; }
        .news-meta { font-size: 11px; color: #888; }

        body.dark-mode { background: #121212; color: white; }
        body.dark-mode .categoria-header { background: #1a1a1a; }
        body.dark-mode .news-item { background: #1e1e1e; }
        body.dark-mode .news-info h3 { color: #eee; }
    </style>
</head>
<body>

<header>
    <button class="btn-icon" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
    <img src="3_20250925_005418_0002.png" class="site-logo" onclick="location.href='index.html'">
    <button class="btn-icon" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
</header>

<div class="categoria-header">
    <h2 id="titulo-categoria">Carregando...</h2>
</div>

<main class="feed-container">
    <div id="cat-feed">
        <p style="text-align:center; color:#888; margin-top:50px;">Buscando notícias...</p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const catChave = urlParams.get('cat');

    const nomesFormatados = {
        'PINTURA': 'Pintura e Adesivos', 'DEPORTACAO': 'Deportação', 'CURIOSIDADES': 'Curiosidades',
        'ROTAS': 'Novas Rotas', 'PEDIDOS': 'Pedidos e Entregas', 'INCIDENTES': 'Incidentes e Acidentes',
        'COLUNAS': 'Colunas', 'CARGUEIRA': 'Aviação Cargueira', 'MILITAR': 'Militar',
        'INFRA': 'Infraestrutura', 'TECNOLOGIA': 'Tecnologia e Inovação', 'HISTORIA': 'História e Cultura',
        'OPINIAO': 'Editorial e Opinião', 'RADAR': 'Radar e Monitoramento', 'FROTA': 'Movimentação de Frota',
        'ESPECIAIS': 'Movimentações Especiais', 'EXECUTIVA': 'Aviação Executiva', 'RELATOS': 'Voos e Relatos',
        'AZUL': 'Azul Linhas Aéreas', 'GOL': 'GOL Linhas Aéreas', 'LATAM': 'LATAM Brasil'
    };

    document.getElementById('titulo-categoria').innerText = nomesFormatados[catChave] || catChave || "Categoria";

    async function carregarCategoria() {
        try {
            const q = query(collection(db, "noticias"));
            const snap = await getDocs(q);
            const feed = document.getElementById('cat-feed');
            
            let noticiasFiltradas = [];

            snap.forEach(docSnap => {
                const dados = docSnap.data();
                if (dados.categoria === catChave) {
                    noticiasFiltradas.push({ id: docSnap.id, ...dados });
                }
            });

            noticiasFiltradas.sort((a, b) => (b.data?.seconds || 0) - (a.data?.seconds || 0));

            if (noticiasFiltradas.length === 0) {
                feed.innerHTML = `<p style="text-align:center; color:#888; margin-top:50px;">Nenhuma notícia encontrada.</p>`;
                return;
            }

            let html = "";
            noticiasFiltradas.forEach(n => {
                const dataFmt = n.data ? new Date(n.data.seconds * 1000).toLocaleDateString('pt-BR') : "";
                
                // Note que aqui REMOVI o contador de visualizações (cliques)
                html += `
                    <article class="news-item" onclick="contarEIr('${n.id}')">
                        <div class="news-photo"><img src="${n.foto}"></div>
                        <div class="news-info">
                            <h3>${n.titulo}</h3>
                            <div class="news-meta">
                                <span><i class="far fa-calendar-alt"></i> ${dataFmt}</span>
                            </div>
                        </div>
                    </article>`;
            });

            feed.innerHTML = html;

        } catch (e) {
            console.error(e);
            document.getElementById('cat-feed').innerHTML = "Erro ao carregar notícias.";
        }
    }

    // Função para somar clique em segredo e ir para a notícia
    window.contarEIr = async (id) => {
        try {
            await updateDoc(doc(db, "noticias", id), { cliques: increment(1) });
        } catch (e) { console.log("Erro view silenciada"); }
        window.location.href = `noticia.html?id=${id}`;
    };

    carregarCategoria();
    if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
</script>
</body>
</html>
