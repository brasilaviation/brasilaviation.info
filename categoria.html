<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation | Categorias</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; transition: background 0.3s; font-family: sans-serif; }
        .feed-container { padding: 15px; max-width: 800px; margin: 0 auto; flex: 1; width: 100%; box-sizing: border-box; }
        .categoria-header { padding: 25px 15px; background: #ffffff; border-bottom: 4px solid #2e7d32; margin-bottom: 20px; text-align: center; }
        .categoria-header h2 { color: #1a237e; text-transform: uppercase; font-size: 20px; margin: 0; }
        .news-item { display: flex; gap: 15px; background: white; padding: 12px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; align-items: center; }
        .news-photo img { width: 110px; height: 80px; border-radius: 10px; object-fit: cover; }
        .news-info h3 { font-size: 15px; margin: 0; color: #333; }
        body.dark-mode { background: #121212; color: white; }
        body.dark-mode .categoria-header { background: #1a1a1a; }
        body.dark-mode .categoria-header h2 { color: #fff; }
        body.dark-mode .news-item { background: #1e1e1e; box-shadow: none; }
        body.dark-mode .news-info h3 { color: #eee; }
    </style>
</head>
<body>

<div id="menu-placeholder"></div>
<div id="header-placeholder"></div>

<div class="categoria-header"><h2 id="titulo-categoria">Carregando...</h2></div>
<main class="feed-container"><div id="cat-feed"></div></main>
<div id="footer-placeholder"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g", authDomain: "braviation3.firebaseapp.app", projectId: "braviation3", storageBucket: "braviation3.firebasestorage.app", messagingSenderId: "979009087877", appId: "1:979009087877:web:490bdc36da545d56b87cec" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function carregarComponentes() {
        const [h, f, m] = await Promise.all([
            fetch('/cabecalho.html').then(r => r.text()),
            fetch('/rodape.html').then(r => r.text()),
            fetch('/menu.html').then(r => r.text())
        ]);
        document.getElementById('header-placeholder').innerHTML = h;
        document.getElementById('footer-placeholder').innerHTML = f;
        document.getElementById('menu-placeholder').innerHTML = m;
        if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
    }

    document.addEventListener('click', (e) => {
        const t = e.target;
        if (t.closest('#open-menu')) document.getElementById('side-menu')?.classList.add('active');
        if (t.closest('#close-menu')) document.getElementById('side-menu')?.classList.remove('active');
        if (t.closest('#btn-toggle-cat')) {
            document.getElementById('lista-cat')?.classList.toggle('active');
            document.getElementById('seta-cat')?.classList.toggle('rotate');
        }
        if (t.closest('#dark-toggle-header')) {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode') ? 'active' : 'inactive');
        }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const catChave = urlParams.get('cat');
    document.getElementById('titulo-categoria').innerText = catChave || "Notícias";

    async function carregarCategoria() {
        const q = query(collection(db, "noticias"), orderBy("data", "desc"));
        const snap = await getDocs(q);
        let html = "";
        
        // Converte a busca para maiúsculo para ignorar erros de digitação
        const filtroBusca = catChave ? catChave.toUpperCase() : "";

        snap.forEach(d => {
            const n = d.data();
            const catNoticia = (n.categoria || n.cat || "").toUpperCase();

            if (catNoticia === filtroBusca) {
                html += `
                <article class="news-item" onclick="window.location.href='/noticia?id=${d.id}'">
                    <div class="news-photo"><img src="${n.foto}"></div>
                    <div class="news-info"><h3>${n.titulo}</h3></div>
                </article>`;
            }
        });
        document.getElementById('cat-feed').innerHTML = html || "<p style='text-align:center;'>Nenhuma notícia encontrada para esta categoria.</p>";
    }

    carregarComponentes();
    carregarCategoria();
</script>
</body>
</html>
