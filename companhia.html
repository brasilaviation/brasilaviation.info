<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companhia | BrasilAviation.info</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css"> 
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --bg: #f4f7f6; --card: #ffffff; --text-main: #1c1c1c; --text-muted: #757575; --radius: 18px; --cor-cia: #1a237e; --border: rgba(0,0,0,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.4; transition: 0.3s; }
        
        body.dark-mode { --bg: #121212; --card: #1e1e1e; --text-main: #f0f0f0; --text-muted: #aaa; --border: rgba(255,255,255,0.1); }

        .hero-cia {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, var(--cor-cia) 0%, rgba(0,0,0,0.85) 100%);
            color: white;
            border-radius: 0 0 30px 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo-container {
            background: white; width: 90px; height: 90px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .logo-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .cia-nome { font-size: 1.8rem; font-weight: 800; }
        .cia-sub { font-size: 0.75rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; }

        main { max-width: 900px; margin: 0 auto; padding-bottom: 60px; min-height: 50vh; }
        .feed-container { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 15px; }
        @media (min-width: 768px) { .feed-container { grid-template-columns: 1fr 1fr; } }
        
        .news-card { display: flex; background: var(--card); padding: 10px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid var(--border); transition: 0.2s; align-items: center; }
        .news-card:hover { border-color: var(--secondary); transform: translateY(-2px); }
        .news-card img { width: 95px; height: 65px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }
        .news-content { margin-left: 12px; }
        .news-content h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; line-height: 1.2; color: var(--text-main); }
        .news-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .news-meta .author { font-weight: 600; color: var(--secondary); }

        .loader { text-align: center; padding: 50px; font-weight: 700; color: var(--cor-cia); grid-column: 1/-1; }
    </style>
</head>
<body>

<div id="header-container"></div>
<div id="menu-container"></div>

<section class="hero-cia" id="hero-bg">
    <div class="logo-container">
        <img id="cia-logo" src="" alt="Logo">
    </div>
    <h1 class="cia-nome" id="cia-titulo">Carregando...</h1>
   <a href="/frotas?" class="cia-titulo"><i class="fas fa-list-circle"></i> Ver frota</a></li>
</section>

<main>
    <div id="news-feed" class="feed-container">
        <div class="loader"><i class="fas fa-circle-notch fa-spin"></i> Buscando notícias...</div>
    </div>
</main>

<div id="footer-container"></div>

<script type="module" src="/loader.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const temas = {
        'GOL': { cor: '#FF6600', logo: '/gol-logo.png', nome: 'GOL Linhas Aéreas' },
        'Azul': { cor: '#003399', logo: '/azul-logo.png', nome: 'Azul Linhas Aéreas' },
        'LATAM': { cor: '#950054', logo: '/latam-logo.png', nome: 'LATAM Airlines' }
    };

    async function carregarCia() {
        const params = new URLSearchParams(window.location.search);
        const urlKey = params.get('c') || params.get('comp') || 'GOL';
        
        const ciaKey = Object.keys(temas).find(k => k.toLowerCase() === urlKey.toLowerCase()) || 'GOL';
        const config = temas[ciaKey];

        document.title = `${config.nome} | BrasilAviation.info`;
        document.getElementById('cia-titulo').innerText = config.nome;
        document.getElementById('cia-logo').src = config.logo;
        document.getElementById('hero-bg').style.setProperty('--cor-cia', config.cor);

        try {
            const q = query(collection(db, "noticias"), where("cat", "==", ciaKey), orderBy("data", "desc"));
            const snap = await getDocs(q);
            const feed = document.getElementById('news-feed');
            feed.innerHTML = "";

            if(snap.empty) {
                feed.innerHTML = "<p style='grid-column:1/-1; text-align:center; padding:40px;'>Nenhuma notícia encontrada para esta companhia.</p>";
                return;
            }

            snap.forEach(ds => {
                const n = ds.data();
                const dataFmt = n.data ? new Date(n.data.seconds * 1000).toLocaleDateString('pt-BR') : "";
                const slugUrl = n.slug ? `/noticia/${n.slug}` : `/noticia/${ds.id}`;
                const imgNoticia = n.foto ? n.foto : config.logo;

                feed.innerHTML += `
                <article class="news-card" onclick="location.href='${slugUrl}'">
                    <img src="${imgNoticia}" alt="Notícia">
                    <div class="news-content">
                        <h4>${n.titulo}</h4>
                        <div class="news-meta">
                            <span class="author">${n.autor || 'Redação'}</span>
                            <span>${dataFmt}</span>
                        </div>
                    </div>
                </article>`;
            });
        } catch (e) { 
            console.error("Erro no radar:", e);
            document.getElementById('news-feed').innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Erro ao carregar notícias.</p>";
        }
    }

    carregarCia();
</script>

</body>
</html>
