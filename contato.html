<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | BrasilAviation.info</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    
    <style>
        main { max-width: 700px; margin: 40px auto; padding: 0 20px; min-height: 80vh; }
        
        .contact-card {
            background: var(--card);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .contact-header { text-align: center; margin-bottom: 30px; }
        .contact-header h1 { color: var(--primary); font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        body.dark-mode .contact-header h1 { color: #fff; }
        .contact-header p { color: var(--text-muted); font-size: 0.95rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; text-transform: uppercase; }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1); }

        .file-input-wrapper {
            position: relative;
            padding: 20px;
            border: 2px dashed var(--border);
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .file-input-wrapper:hover { border-color: var(--secondary); background: rgba(46, 125, 50, 0.02); }
        .file-input-wrapper input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .file-label { font-size: 13px; color: var(--text-muted); }
        .file-label i { display: block; font-size: 24px; color: var(--secondary); margin-bottom: 8px; }

        .btn-send {
            width: 100%;
            padding: 15px;
            background-color: var(--secondary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-send:hover { opacity: 0.9; transform: translateY(-2px); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="header-container"></div>
<div id="menu-container"></div>

<main>
    <div class="contact-card">
        <div class="contact-header">
            <h1>Fale Conosco</h1>
            <p>Dúvidas, sugestões de pauta ou parcerias? Envie sua mensagem para a nossa redação.</p>
        </div>

        <form action="https://formspree.io/f/meevpvqq" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Nome e sobrenome</label>
                <input type="text" name="nome" class="form-control" placeholder="Seu nome" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="email@exemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Confirmar E-mail</label>
                    <input type="email" name="_replyto" class="form-control" placeholder="Repita seu e-mail" required>
                </div>
            </div>

            <div class="form-group">
                <label>Motivo do Contato</label>
                <select name="assunto" class="form-control" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="Sugestão de Pauta">Sugestão de Pauta / Flagra</option>
                    <option value="Crítica/Sugestão">Crítica ou Sugestão</option>
                    <option value="Reclamação">Reclamação</option>
                    <option value="Parceria">Parceria Comercial</option>
                    <option value="Outros">Outros Assuntos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sua Mensagem</label>
                <textarea name="mensagem" class="form-control" rows="5" placeholder="Como podemos ajudar?" required></textarea>
            </div>

            <div class="form-group">
                <label>Anexar Imagem ou Documento (Máx. 10MB)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="file-upload" name="upload" accept="image/*,.pdf,.doc,.docx">
                    <div class="file-label">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span id="file-name-display">Clique para selecionar ou arraste o arquivo aqui</span>
                        <br><small>(Opcional)</small>
                    </div>
                </div>
            </div>

            <input type="text" name="_gotcha" style="display:none">

            <button type="submit" class="btn-send">
                <i class="fas fa-paper-plane"></i> Enviar
            </button>

        </form>
    </div>
</main>

<div id="footer-container"></div>

<script type="module" src="/loader.js"></script>

<script>
    // Script local apenas para a estética do input de arquivo
    const fileInput = document.getElementById('file-upload');
    const display = document.getElementById('file-name-display');

    if (fileInput) {
        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                display.innerText = "Arquivo: " + e.target.files[0].name;
                display.style.color = "var(--secondary)";
            }
        });
    }
</script>

</body>
</html>
