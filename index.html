
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation.info | Notícias de Aviação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .carousel-slide { position: relative; width: 100%; height: 100%; display: none; cursor: pointer; overflow: hidden; }
        .carousel-slide.active { display: block; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .news-meta { font-size: 11px; color: #777; margin-top: 5px; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f9; transition: 0.3s; }
        body.dark-mode { background: #121212; color: #eee; }
    </style>
</head>
<body>

<div id="header-container"></div>
<div id="menu-container"></div>

<main>
    <h2 class="section-title" style="padding: 15px; font-weight: bold;">Destaques</h2>
    <div class="carousel-wrapper">
        <div class="carousel-container" id="carousel-area" style="aspect-ratio: 3/2; height: auto;">
            <button class="carousel-btn btn-prev" id="prev-btn" style="z-index: 20;"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-btn btn-next" id="next-btn" style="z-index: 20;"><i class="fas fa-chevron-right"></i></button>
            <div id="slides-holder" style="width: 100%; height: 100%;"></div>
        </div>
    </div>
    <h2 class="feed-header" style="margin: 20px 15px 10px; border-bottom:3px solid #2e7d32; display:inline-block; font-weight:bold; font-size:20px;">Últimas Notícias</h2>
    <div id="news-feed"></div>
</main>

<div id="footer-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LOGICA CABEÇALHO ---
    function ativarComandosCabecalho() {
        const openBtn = document.getElementById('open-menu');
        const sBox = document.getElementById('search-box-header');
        const sInput = document.getElementById('input-busca-header');
        const btnLupa = document.getElementById('btn-lupa-header');
        const btnDark = document.getElementById('dark-toggle-header');

        if(openBtn) openBtn.onclick = () => document.getElementById('side-menu').classList.add('active');

        if(btnLupa) btnLupa.onclick = (e) => {
            e.stopPropagation();
            if (!sBox.classList.contains('active')) {
                sBox.classList.add('active');
                sInput.focus();
            } else if (sInput.value.trim()) {
                window.location.href = `pesquisa.html?q=${encodeURIComponent(sInput.value)}`;
            }
        };

        if(btnDark) {
            btnDark.onclick = () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('dark-mode', isDark ? 'active' : 'inactive');
                btnDark.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            };
            if(document.body.classList.contains('dark-mode')) btnDark.innerHTML = '<i class="fas fa-sun"></i>';
        }
    }

    // --- LOGICA MENU (FECHAR E SANFONA) ---
    function ativarComandosMenu() {
        const closeBtn = document.getElementById('close-menu');
        const btnToggleCat = document.getElementById('btn-toggle-cat');
        const listaCat = document.getElementById('lista-cat');
        const setaCat = document.getElementById('seta-cat');

        if(closeBtn) closeBtn.onclick = () => document.getElementById('side-menu').classList.remove('active');

        if(btnToggleCat) {
            btnToggleCat.onclick = (e) => {
                e.preventDefault();
                listaCat.classList.toggle('active');
                setaCat.classList.toggle('rotate');
            };
        }
    }

    // --- CARREGAMENTO DE COMPONENTES ---
    fetch('cabecalho.html').then(r => r.text()).then(h => {
        document.getElementById('header-container').innerHTML = h;
        ativarComandosCabecalho();
    });

    fetch('menu.html').then(r => r.text()).then(h => {
        document.getElementById('menu-container').innerHTML = h;
        ativarComandosMenu(); // Ativa a sanfona e o fechar logo após carregar o menu
    });

    fetch('rodape.html').then(r => r.text()).then(h => {
        document.getElementById('footer-container').innerHTML = h;
        let secretClicks = 0, secretTimer;
        const adminGate = document.getElementById('admin-gate');
        if(adminGate) adminGate.onclick = () => {
            secretClicks++;
            clearTimeout(secretTimer);
            secretTimer = setTimeout(() => secretClicks = 0, 1500); 
            if(secretClicks === 4) window.location.href = 'admin.html';
        };
    });

    // --- FIREBASE & CARROSSEL ---
    async function carregarDestaques() {
        const holder = document.getElementById('slides-holder');
        const q = query(collection(db, "noticias"), orderBy("cliques", "desc"), limit(5));
        const snap = await getDocs(q);
        let html = "";
        let i = 0;
        snap.forEach(docSnap => {
            const n = docSnap.data();
            html += `<div class="carousel-slide ${i === 0 ? 'active' : ''}" onclick="location.href='noticia.html?p=${n.slug || docSnap.id}'">
                <img src="${n.foto}"><div class="carousel-caption"><span class="badge-cat">${n.categoria}</span><h3>${n.titulo}</h3></div></div>`;
            i++;
        });
        holder.innerHTML = html;
        iniciarLogicaCarrossel();
    }

    async function carregarFeed() {
        const feed = document.getElementById('news-feed');
        const q = query(collection(db, "noticias"), orderBy("data", "desc"));
        const snap = await getDocs(q);
        let html = "";
        snap.forEach(docSnap => {
            const n = docSnap.data();
            const data = n.data ? n.data.toDate().toLocaleDateString('pt-BR') : "";
            html += `<article class="news-item" onclick="location.href='noticia.html?p=${n.slug || docSnap.id}'" style="cursor:pointer;">
                <div class="news-photo"><img src="${n.foto}" style="aspect-ratio:3/2; object-fit:cover;"></div>
                <div class="news-info"><h3>${n.titulo}</h3><div class="news-meta"><span>${n.autor || 'Redação'}</span> • ${data}</div></div></article>`;
        });
        feed.innerHTML = html;
    }

    let slideIndex = 0;
    function iniciarLogicaCarrossel() {
        const slides = document.querySelectorAll('.carousel-slide');
        if(slides.length === 0) return;
        const mostrarSlide = (n) => {
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (n + slides.length) % slides.length;
            slides[slideIndex].classList.add('active');
        };
        document.getElementById('next-btn').onclick = (e) => { e.stopPropagation(); mostrarSlide(slideIndex + 1); };
        document.getElementById('prev-btn').onclick = (e) => { e.stopPropagation(); mostrarSlide(slideIndex - 1); };
        setInterval(() => mostrarSlide(slideIndex + 1), 5000);
    }

    if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
    carregarDestaques();
    carregarFeed();
</script>
</body>
</html>
