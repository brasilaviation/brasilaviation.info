<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation.info | Notícias de Aviação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .logo-cia { width: 24px; height: 24px; object-fit: contain; margin-right: 12px; vertical-align: middle; }
        
        /* Ajuste do Carrossel para tirar o Zoom */
        .carousel-slide { position: relative; width: 100%; height: 100%; display: none; cursor: pointer; overflow: hidden; }
        .carousel-slide.active { display: block; }
        .carousel-slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Mantém a proporção sem esticar */
            display: block;
        }

        .search-container { 
            display: flex; align-items: center; position: relative; border: 1.5px solid #2e7d32; 
            padding: 2px; border-radius: 25px; transition: all 0.4s; width: 38px; height: 38px; overflow: hidden; 
        }
        .search-container.active { width: 190px; background: #fff; border-color: #eee; }
        .search-input { border: none; background: transparent; outline: none; width: 0; font-size: 14px; transition: 0.4s; }
        .search-container.active .search-input { width: 140px; padding: 0 10px; }
        .btn-search { background: none; border: none; cursor: pointer; color: #2e7d32; width: 32px; display: flex; align-items: center; justify-content: center; }
        
        .news-meta { font-size: 11px; color: #777; margin-top: 5px; }
        .news-meta a { color: #2e7d32; text-decoration: none; font-weight: bold; }
        
        body.dark-mode .search-container.active { background: #222; }
    </style>
</head>
<body>

<header>
    <button class="btn-icon" id="open-menu"><i class="fas fa-bars"></i></button>
    <img src="3_20250925_005418_0002.png" class="site-logo" alt="BrasilAviation" onclick="location.href='index.html'">
    <div style="display: flex; gap: 8px; align-items: center;">
        <div class="search-container" id="search-box">
            <input type="text" id="input-busca" class="search-input" placeholder="Pesquisar...">
            <button class="btn-search" id="btn-lupa"><i class="fas fa-search"></i></button>
        </div>
        <button class="btn-dark-toggle" id="dark-mode-toggle"><i class="fas fa-moon"></i></button>
    </div>
</header>

<div id="menu-container"></div>

<main>
    <h2 class="section-title" style="padding: 15px; font-weight: bold;">Destaques</h2>
    <div class="carousel-wrapper">
        <div class="carousel-container" id="carousel-area">
            <button class="carousel-btn btn-prev" id="prev-btn" style="z-index: 20;"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-btn btn-next" id="next-btn" style="z-index: 20;"><i class="fas fa-chevron-right"></i></button>
            
            <div id="slides-holder" style="width: 100%; height: 100%;">
                </div>
        </div>
    </div>

    <h2 class="feed-header" style="margin: 20px 15px 10px; border-bottom:3px solid #2e7d32; display:inline-block; font-weight:bold; font-size:20px;">Últimas Notícias</h2>
    <div id="news-feed"></div>
</main>

<footer>
    <img src="3_20250925_005418_0002.png" style="height: 35px; margin-bottom: 10px;">
    <p style="font-size: 11px; color: #999;">&copy; 2026 BrasilAviation.info</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function carregarDestaques() {
        const holder = document.getElementById('slides-holder');
        const q = query(collection(db, "noticias"), orderBy("cliques", "desc"), limit(5));
        const snap = await getDocs(q);
        let html = "";
        let i = 0;
        
        snap.forEach(doc => {
            const n = doc.data();
            html += `
                <div class="carousel-slide ${i === 0 ? 'active' : ''}" onclick="location.href='noticia.html?id=${doc.id}'">
                    <img src="${n.foto}">
                    <div class="carousel-caption">
                        <span class="badge-cat" style="background:#2e7d32; padding:3px 8px; border-radius:5px; font-size:10px;">${n.categoria}</span>
                        <h3 style="margin-top:5px;">${n.titulo}</h3>
                    </div>
                </div>`;
            i++;
        });
        holder.innerHTML = html;
        iniciarLogicaCarrossel();
    }

    async function carregarFeed() {
        const feed = document.getElementById('news-feed');
        const q = query(collection(db, "noticias"), orderBy("data", "desc"));
        const snap = await getDocs(q);
        let html = "";
        snap.forEach(doc => {
            const n = doc.data();
            const data = n.data ? n.data.toDate().toLocaleDateString('pt-BR') : "";
            html += `
                <article class="news-item" onclick="location.href='noticia.html?id=${doc.id}'">
                    <div class="news-photo"><img src="${n.foto}"></div>
                    <div class="news-info">
                        <h3>${n.titulo}</h3>
                        <div class="news-meta"><span>${n.autor || 'Redação'}</span> • ${data}</div>
                    </div>
                </article>`;
        });
        feed.innerHTML = html;
    }

    // Lógica do Carrossel (Girar sozinho)
    let slideIndex = 0;
    function iniciarLogicaCarrossel() {
        const slides = document.querySelectorAll('.carousel-slide');
        if(slides.length === 0) return;

        function mostrarSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            slideIndex = (n + slides.length) % slides.length;
            slides[slideIndex].classList.add('active');
        }

        document.getElementById('next-btn').onclick = (e) => { e.stopPropagation(); mostrarSlide(slideIndex + 1); };
        document.getElementById('prev-btn').onclick = (e) => { e.stopPropagation(); mostrarSlide(slideIndex - 1); };

        // Auto-play a cada 5 segundos
        setInterval(() => mostrarSlide(slideIndex + 1), 5000);
    }

    fetch('menu.html').then(r => r.text()).then(h => {
        document.getElementById('menu-container').innerHTML = h;
        const menu = document.getElementById('side-menu');
        document.getElementById('open-menu').onclick = () => menu.classList.add('active');
        document.getElementById('close-menu').onclick = () => menu.classList.remove('active');
    });

    carregarDestaques();
    carregarFeed();
</script>

<script>
    // Pesquisa e Dark Mode
    const searchBox = document.getElementById('search-box');
    const inputBusca = document.getElementById('input-busca');
    document.getElementById('btn-lupa').onclick = (e) => {
        e.stopPropagation();
        if (!searchBox.classList.contains('active')) {
            searchBox.classList.add('active');
            inputBusca.focus();
        } else if (inputBusca.value.trim()) {
            window.location.href = `pesquisa.html?q=${encodeURIComponent(inputBusca.value)}`;
        }
    };
    document.addEventListener('click', (e) => { if (!searchBox.contains(e.target)) searchBox.classList.remove('active'); });

    const btnDark = document.getElementById('dark-mode-toggle');
    if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
    btnDark.onclick = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode') ? 'active' : 'inactive');
    };
</script>
</body>
</html>
