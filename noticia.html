<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícia | BrasilAviation.info</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; transition: background 0.3s, color 0.3s; }
        .noticia-container { max-width: 800px; margin: 0 auto; padding: 20px; flex: 1; }
        
        /* Imagem e Legenda */
        .noticia-capa { width: 100%; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .legenda-foto {
            display: block;
            border-left: 5px solid #2e7d32;
            border-radius: 4px;
            padding: 2px 0 2px 12px;
            margin-bottom: 25px;
            font-size: 13px;
            font-style: italic;
            color: #666; /* Cor para modo claro */
            text-align: left;
            line-height: 1.4;
        }

        /* Títulos e Textos */
        .noticia-titulo { font-size: 28px; font-weight: bold; margin: 10px 0; color: #111; line-height: 1.2; }
        .info-publicacao { font-size: 13px; color: #888; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .noticia-corpo { font-size: 18px; line-height: 1.8; color: #333; text-align: justify; margin-bottom: 40px; }
        
        /* Ajustes para Modo Escuro */
        body.dark-mode { background-color: #121212; color: #ffffff; }
        body.dark-mode .noticia-titulo { color: #ffffff; }
        body.dark-mode .noticia-corpo { color: #dddddd; }
        body.dark-mode .legenda-foto { color: #bbbbbb; border-left-color: #4caf50; }
        body.dark-mode .info-publicacao { border-bottom-color: #333; }

        /* Navegação */
        .breadcrumbs { padding: 10px 0; font-size: 13px; color: #888; margin-bottom: 15px; }
        .breadcrumbs a { color: #2e7d32; text-decoration: none; font-weight: bold; }
        .breadcrumbs span { margin: 0 5px; }

        .categoria-tag-final { display: inline-block; background: #eef2ff; color: #1a237e; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 20px; border: 1px solid #d1d5db; transition: 0.3s; }
        body.dark-mode .categoria-tag-final { background: #1e1e1e; color: #8bb1ff; border-color: #444; }
        
        footer { background: #f9f9f9; padding: 30px 20px; border-top: 1px solid #eee; margin-top: 40px; text-align: center; }
        body.dark-mode footer { background: #1a1a1a; border-color: #333; }
    </style>
</head>
<body>

<header>
    <button class="btn-icon" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <img src="3_20250925_005418_0002.png" style="height:30px; cursor:pointer;" onclick="location.href='index.html'">
    <div style="display: flex; gap: 10px; align-items: center;">
        <button class="btn-dark-toggle" id="dark-mode-toggle"><i class="fas fa-moon"></i></button>
        <button class="btn-icon"><i class="fas fa-share-alt"></i></button>
    </div>
</header>

<main class="noticia-container">
    <div class="breadcrumbs" id="breadcrumbs">
        <a href="index.html">Início</a> <span>/</span> <a href="#">Notícias</a>
    </div>
    <div id="conteudo-noticia">
        <p style="text-align:center; padding-top:50px; color:#888;">Carregando conteúdo exclusivo...</p>
    </div>
</main>

<footer>
    <img src="3_20250925_005418_0002.png" style="height: 35px; margin-bottom: 20px;">
    <ul style="display: flex; justify-content: center; gap: 15px; list-style: none; margin-bottom: 15px; padding: 0;">
        <li><a href="pagina.html?ref=sobre" style="text-decoration: none; color: inherit; font-size: 13px;">Sobre Nós</a></li>
        <li><a href="pagina.html?ref=contato" style="text-decoration: none; color: inherit; font-size: 13px;">Contato</a></li>
        <li><a href="pagina.html?ref=privacidade" style="text-decoration: none; color: inherit; font-size: 13px;">Privacidade</a></li>
        <li><a href="pagina.html?ref=termos" style="text-decoration: none; color: inherit; font-size: 13px;">Termos de Uso</a></li>
    </ul>
    <p style="font-size: 11px; color: #999;">&copy; 2026 BrasilAviation.info - Jornalismo Aeronáutico Independente</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // MODO ESCURO
    const btnDark = document.getElementById('dark-mode-toggle');
    const iconDark = btnDark.querySelector('i');
    if (localStorage.getItem('dark-mode') === 'active') {
        document.body.classList.add('dark-mode');
        iconDark.classList.replace('fa-moon', 'fa-sun');
    }
    btnDark.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('dark-mode', isDark ? 'active' : 'inactive');
        iconDark.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
    };

    async function carregarNoticia() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if(!id) return;

        try {
            const docRef = doc(db, "noticias", id);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const n = docSnap.data();
                
                // Incrementar Cliques
                await updateDoc(docRef, { cliques: increment(1) });

                // Data por Extenso (Ex: 22 de abril de 2026)
                const dataExtenso = n.data ? n.data.toDate().toLocaleDateString('pt-BR', {
                    day: '2-digit', month: 'long', year: 'numeric'
                }) : "Data indisponível";

                const autor = n.autor || "Redação BrasilAviation";
                const cat = n.categoria || "Geral";
                const cias = ["AZUL", "GOL", "LATAM"];
                const linkDestino = cias.includes(cat.toUpperCase()) ? `companhia.html?cia=${cat.toLowerCase()}` : `categoria.html?cat=${cat}`;

                document.getElementById('breadcrumbs').innerHTML = `<a href="index.html">Início</a> <span>/</span> <a href="${linkDestino}">${cat}</a>`;
                
                document.getElementById('conteudo-noticia').innerHTML = `
                    <h1 class="noticia-titulo">${n.titulo}</h1>
                    <div class="info-publicacao">
                        <i class="far fa-calendar-alt"></i> ${dataExtenso} | 
                        <i class="far fa-user"></i> Por: <strong>${autor}</strong>
                    </div>
                    <img src="${n.foto}" class="noticia-capa">
                    ${n.legenda ? `<span class="legenda-foto">${n.legenda}</span>` : ''}
                    <div class="noticia-corpo">${n.texto.replace(/\n/g, '<br>')}</div>
                    
                    <p style="font-size: 14px; font-weight: bold; color: #888; margin-top:30px;">CATEGORIA:</p>
                    <a href="${linkDestino}" class="categoria-tag-final"><i class="fas fa-tag" style="margin-right:8px;"></i>${cat}</a>
                `;
                document.title = n.titulo + " | BrasilAviation.info";
            }
        } catch (e) { console.error("Erro ao carregar matéria:", e); }
    }
    carregarNoticia();
</script>
</body>
</html>
