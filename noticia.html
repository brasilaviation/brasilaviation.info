<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation | Notícia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ESTILOS PADRONIZADOS --- */
        .noticia-container { padding: 20px; max-width: 800px; margin: 0 auto; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .logo-cia { width: 24px; height: 24px; object-fit: contain; margin-right: 12px; vertical-align: middle; }
        .menu-section-title { padding: 15px 20px 5px; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Breadcrumb */
        .breadcrumb { font-size: 13px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .breadcrumb span { color: #2e7d32; }
        .breadcrumb b { color: #ccc; margin: 0 8px; }

        /* Título e Meta */
        .noticia-container h1 { font-size: 30px; color: #1a237e; margin-bottom: 15px; font-weight: 800; line-height: 1.2; }
        .meta-info { display: flex; align-items: center; gap: 15px; color: #777; font-size: 13px; margin-bottom: 25px; font-weight: 500; }
        .meta-info i { margin-right: 4px; color: #999; }
        .meta-info a { color: #2e7d32; text-decoration: none; font-weight: 700; }

        /* Imagem de Capa */
        .main-photo { width: 100%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); object-fit: cover; max-height: 450px; }

        /* Barra Lateral Verde e Texto */
        .quote-box { border-left: 5px solid #2e7d32; padding-left: 15px; font-style: italic; color: #666; margin-bottom: 25px; font-size: 18px; line-height: 1.4; }
        .corpo-texto { font-size: 17.5px; color: #333; line-height: 1.8; text-align: justify; }
        .corpo-texto p { margin-bottom: 20px; }

        /* Tags */
        .tag-area { margin-top: 40px; border-top: 1px solid #eee; padding-top: 25px; }
        .tag-label { font-size: 11px; font-weight: 900; color: #999; margin-bottom: 12px; display: block; }
        .btn-tag { background: #f0f3ff; color: #1a237e; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; border: 1px solid #e0e6ff; }

        /* Header e Footer */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #fff; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .btn-icon-top { background: none; border: none; font-size: 20px; color: #2e7d32; cursor: pointer; }
        
        footer { text-align: center; padding: 60px 20px; background: #fafafa; border-top: 1px solid #eee; margin-top: 50px; }
        footer img { height: 45px; margin-bottom: 25px; opacity: 0.8; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; font-size: 13px; }
        .footer-links a { color: #555; text-decoration: none; font-weight: 600; }

        /* Submenu das Categorias */
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: rgba(0,0,0,0.03); border-radius: 0 0 8px 8px; }
        .submenu.active { max-height: 1500px; padding-bottom: 10px; }
        .submenu a { padding: 10px 20px 10px 50px !important; font-size: 13px !important; color: #555 !important; border: none !important; }
        .menu-arrow { transition: transform 0.3s; font-size: 12px; color: #bbb; }
        .menu-arrow.rotate { transform: rotate(180deg); }

        /* Dark Mode */
        body.dark-mode { background: #121212; color: #eee; }
        body.dark-mode header { background: #121212; border-bottom-color: #333; }
        body.dark-mode .noticia-container h1 { color: #fff; }
        body.dark-mode .corpo-texto { color: #ccc; }
        body.dark-mode .quote-box { color: #bbb; }
        body.dark-mode footer { background: #1a1a1a; border-top-color: #333; }
        body.dark-mode .btn-tag { background: #222; color: #8bb1ff; border-color: #333; }
        body.dark-mode .submenu { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body id="body">

<header>
    <button class="btn-icon-top" id="open-menu"><i class="fas fa-bars"></i></button>
    <img src="3_20250925_005418_0002.png" style="height: 35px; cursor: pointer;" onclick="location.href='index.html'">
    <div style="display: flex; gap: 18px;">
        <button class="btn-icon-top" id="dark-toggle"><i class="far fa-moon"></i></button>
        <button class="btn-icon-top" id="share-btn"><i class="fas fa-share-alt"></i></button>
    </div>
</header>

<div id="menu-container"></div>

<main class="noticia-container" id="noticia-render">
    <p style="text-align:center; padding:100px; color:#888;">Preparando motores...</p>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- CARREGAR MENU EXTERNO ---
    async function carregarMenu() {
        try {
            const resp = await fetch('menu.html');
            const html = await resp.text();
            document.getElementById('menu-container').innerHTML = html;
            
            const menu = document.getElementById('side-menu');
            document.getElementById('open-menu').onclick = () => menu.classList.add('active');
            document.getElementById('close-menu').onclick = () => menu.classList.remove('active');
        } catch (e) { console.error("Erro ao carregar menu:", e); }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const noticiaId = urlParams.get('id');

    async function carregarNoticia() {
        if (!noticiaId) return;

        try {
            const docRef = doc(db, "noticias", noticiaId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const n = docSnap.data();
                const dataFormatada = n.data ? n.data.toDate().toLocaleDateString('pt-BR', {
                    day: 'numeric', month: 'long', year: 'numeric'
                }) : "Data não disponível";

                document.title = `BrasilAviation | ${n.titulo}`;

                document.getElementById('noticia-render').innerHTML = `
                    <div class="breadcrumb">
                        <span>Início</span> <b>/</b> <span>${n.categoria || 'AVIAÇÃO'}</span>
                    </div>

                    <h1>${n.titulo}</h1>

                    <div class="meta-info">
                        <span><i class="far fa-calendar-alt"></i> ${dataFormatada}</span>
                        <span>| <i class="far fa-user"></i> Por: <a href="perfil.html?nome=${encodeURIComponent(n.autor || 'Miguel Barbosa')}">${n.autor || 'Miguel Barbosa'}</a></span>
                    </div>

                    <img src="${n.foto}" class="main-photo">

                    <div class="quote-box">${n.resumo || n.titulo}</div>

                    <div class="corpo-texto">
                        ${n.conteudo}
                    </div>

                    <div class="tag-area">
                        <span class="tag-label">ASSUNTO RELACIONADO:</span>
                        <a href="categoria.html?cat=${n.categoria}" class="btn-tag">
                            <i class="fas fa-plane"></i> ${n.categoria || 'Notícias'}
                        </a>
                    </div>

                    <footer>
                        <img src="3_20250925_005418_0002.png">
                        <div class="footer-links">
                            <a href="pagina.html?ref=sobre">Quem Somos</a>
                            <a href="pagina.html?ref=contato">Redação</a>
                            <a href="pagina.html?ref=privacidade">Privacidade</a>
                            <a href="pagina.html?ref=termos">Termos</a>
                        </div>
                    </footer>
                `;

                document.getElementById('share-btn').onclick = () => {
                    if (navigator.share) {
                        navigator.share({ title: n.titulo, url: window.location.href });
                    }
                };
            }
        } catch (e) { console.error(e); }
    }

    carregarMenu();
    carregarNoticia();
</script>

<script>
    // Lógica global para o Dark Mode e Toggle de Categorias
    window.toggleCategorias = function() {
        const lista = document.getElementById('lista-cat');
        const seta = document.getElementById('seta-cat');
        if(lista) lista.classList.toggle('active');
        if(seta) seta.classList.toggle('rotate');
    }

    const btnDark = document.getElementById('dark-toggle');
    if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');

    btnDark.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const mode = document.body.classList.contains('dark-mode') ? 'active' : 'inactive';
        localStorage.setItem('dark-mode', mode);
    };
</script>
</body>
</html>
