<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WDDLX428B0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WDDLX428B0');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando notícia... | BrasilAviation.info</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css"> 
    <style>
        :root {
            --primary: #1a237e; --secondary: #2e7d32; --bg: #ffffff;
            --text-main: #1c1c1c; --text-muted: #666; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; transition: 0.3s; margin: 0; }
        body.dark-mode { --bg: #121212; --text-main: #f0f0f0; --text-muted: #aaa; }

        .logo-site {
            display: block;
            max-width: 220px;
            height: auto;
            margin: 10px auto;
            transition: 0.3s;
        }

        main { max-width: 800px; margin: 20px auto; padding: 0 20px; min-height: 80vh; }

        .breadcrumb { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--secondary); margin-bottom: 15px; letter-spacing: 0.5px; }
        .breadcrumb a { text-decoration: none; color: inherit; transition: 0.3s; }
        
        .noticia-titulo { font-size: 32px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; color: var(--primary); letter-spacing: -0.5px; }
        body.dark-mode .noticia-titulo { color: #fff; }

        .noticia-meta { display: flex; align-items: center; gap: 15px; font-size: 13px; color: var(--text-muted); margin-bottom: 25px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 15px; }
        .meta-item { display: flex; align-items: center; gap: 5px; }
        .meta-item i { color: var(--secondary); }
        .meta-item a { color: inherit; text-decoration: none; font-weight: 600; transition: 0.2s; }
        .meta-item a:hover { color: var(--secondary); }

        .noticia-imagem-container { width: 100%; margin-bottom: 10px; }
        .noticia-imagem-container img { width: 100%; border-radius: var(--radius); object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .noticia-legenda { font-size: 12.5px; color: var(--text-muted); border-left: 3px solid var(--secondary); padding-left: 10px; margin-bottom: 30px; font-style: italic; }

        .noticia-corpo { font-size: 18px; margin-bottom: 30px; color: var(--text-main); }
        .noticia-corpo p { margin-bottom: 20px; }
        .noticia-corpo img { max-width: 100%; height: auto; border-radius: var(--radius); display: block; margin: 30px 0; }
        .noticia-corpo a { color: var(--secondary); text-decoration: underline; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag-item { background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--text-main); text-decoration: none; font-weight: 500; }
        body.dark-mode .tag-item { background: #252525; }

        .share-bar { display: flex; align-items: center; gap: 10px; margin: 40px 0; padding: 15px; background: rgba(0,0,0,0.03); border-radius: var(--radius); }
        .share-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; transition: 0.3s; border: none; cursor: pointer; }
        .btn-wa { background: #25D366; }
        .btn-x { background: #000; }
        .btn-copy { background: var(--secondary); }
        .share-btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .loading { text-align: center; padding: 100px 20px; color: var(--text-muted); font-weight: 600; }
    </style>
</head>
<body>

<div id="header-container">
    <a href="/index.html">
        <img src="/logobrasilaviation.info.png" alt="Brasil Aviation Logo" class="logo-site">
    </a>
</div>

<div id="menu-container"></div>

<main id="noticia-layout">
    <div class="loading"><i class="fas fa-plane fa-spin"></i> Preparando decolagem da informação...</div>
</main>

<div id="footer-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadComp(id, path) {
        try {
            const r = await fetch('/' + path);
            if(r.ok) {
                const content = await r.text();
                document.getElementById(id).innerHTML = content;
                if(id === 'header-container') setTimeout(ativarBuscaManual, 200);
                ativarInteracoesUI();
            }
        } catch (e) { console.error("Erro ao carregar:", path); }
    }

    function ativarBuscaManual() {
        const searchBox = document.getElementById('search-box-header');
        const btnLupa = document.getElementById('btn-lupa-header');
        const inputBusca = document.getElementById('input-busca-header');
        if (btnLupa && searchBox) {
            btnLupa.onclick = (e) => {
                e.preventDefault();
                if (!searchBox.classList.contains('active')) {
                    searchBox.classList.add('active');
                    inputBusca.focus();
                } else {
                    const termo = inputBusca.value.trim();
                    if (termo !== "") window.location.href = `/pesquisa.html?q=${encodeURIComponent(termo)}`;
                    else searchBox.classList.remove('active');
                }
            };
        }
    }

    function ativarInteracoesUI() {
        const btnMenu = document.getElementById('open-menu'); 
        const sideMenu = document.getElementById('side-menu'); 
        const btnClose = document.getElementById('close-menu');
        const btnDark = document.getElementById('dark-toggle-header');
        if (btnMenu && sideMenu) btnMenu.onclick = () => sideMenu.style.left = "0";
        if (btnClose && sideMenu) btnClose.onclick = () => sideMenu.style.left = "-100%";
        if (btnDark) {
            btnDark.onclick = () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode') ? 'active' : 'inactive');
            };
        }
        if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
    }

    loadComp('header-container', 'cabecalho.html');
    loadComp('menu-container', 'menu.html');
    loadComp('footer-container', 'rodape.html');

    window.copiarLink = function() {
        navigator.clipboard.writeText(window.location.href);
        alert("Link da notícia copiado!");
    };

    async function carregarNoticia() {
        const params = new URLSearchParams(window.location.search);
        let idOuSlug = params.get('id');

        if (!idOuSlug) {
            const pathParts = window.location.pathname.split('/').filter(p => p !== "");
            idOuSlug = pathParts[pathParts.length - 1];
            if(idOuSlug === 'noticia' || idOuSlug === 'noticia.html') idOuSlug = null;
        }

        if (!idOuSlug) {
            document.getElementById('noticia-layout').innerHTML = "<p>Notícia não encontrada.</p>";
            return;
        }

        try {
            let n = null;
            let docRefReal = null;

            const q = query(collection(db, "noticias"), where("slug", "==", idOuSlug));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                n = querySnapshot.docs[0].data();
                docRefReal = querySnapshot.docs[0].ref;
            } else {
                const docRef = doc(db, "noticias", idOuSlug);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    n = docSnap.data();
                    docRefReal = docRef;
                }
            }

            if (n) {
                const dataFmt = n.data ? new Date(n.data.seconds * 1000).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: 'long', year: 'numeric'
                }) : "Recentemente";

                let tagsHtml = "";
                if (n.tags) {
                    n.tags.split(',').forEach(t => {
                        tagsHtml += `<a href="/pesquisa.html?q=${t.trim()}" class="tag-item">#${t.trim()}</a>`;
                    });
                }

                updateDoc(docRefReal, { cliques: increment(1) });

                const shareText = encodeURIComponent(n.titulo);
                const shareUrl = encodeURIComponent(window.location.href);
                const nomeAutor = n.autor || 'Miguel Barbosa';

                document.getElementById('noticia-layout').innerHTML = `
                    <div class="breadcrumb">
                        <a href="/index.html">INÍCIO</a> / 
                        <a href="/categoria.html?cat=${encodeURIComponent(n.cat || 'Geral')}">${n.cat || 'GERAL'}</a>
                    </div>
                    <h1 class="noticia-titulo">${n.titulo}</h1>
                    <div class="noticia-meta">
                        <div class="meta-item">
                            <i class="fas fa-user"></i> Por 
                            <a href="/perfil.html?nome=${encodeURIComponent(nomeAutor)}">${nomeAutor}</a>
                        </div>
                        <div class="meta-item"><i class="fas fa-calendar-alt"></i> ${dataFmt}</div>
                    </div>
                    <div class="noticia-imagem-container"><img src="${n.foto}"></div>
                    <div class="noticia-legenda">${n.legenda || 'Foto: Reprodução / BrasilAviation'}</div>
                    <div class="noticia-corpo">${n.texto || n.corpo || 'O conteúdo desta notícia está sendo processado...'}</div>
                    <div class="tag-list">${tagsHtml}</div>
                    <div class="share-bar">
                        <a href="https://api.whatsapp.com/send?text=${shareText}%20${shareUrl}" target="_blank" class="share-btn btn-wa"><i class="fab fa-whatsapp"></i></a>
                        <a href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}" target="_blank" class="share-btn btn-x"><i class="fab fa-x-twitter"></i></a>
                        <button onclick="copiarLink()" class="share-btn btn-copy"><i class="fas fa-link"></i></button>
                    </div>
                `;
                document.title = `${n.titulo} | BrasilAviation.info`;
            } else {
                document.getElementById('noticia-layout').innerHTML = "<p>Notícia não encontrada no nosso hangar.</p>";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('noticia-layout').innerHTML = "<p>Erro técnico ao carregar a notícia.</p>";
        }
    }

    carregarNoticia();
</script>
</body>
</html>
