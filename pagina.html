<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation | Notícia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ESTILOS GERAIS E DARK MODE --- */
        :root { --primary: #1a237e; --secondary: #2e7d32; --text: #333; --light-text: #666; --bg: #ffffff; }
        body.dark-mode { --bg: #121212; --text: #eee; --light-text: #aaa; --primary: #ffffff; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; transition: 0.3s; background: var(--bg); color: var(--text); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #eee; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        
        .noticia-container { padding: 20px; max-width: 800px; margin: 0 auto; min-height: 80vh; }
        
        /* Breadcrumb */
        .breadcrumb { font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; color: #888; }
        .breadcrumb span { color: var(--secondary); }

        /* Título e Meta */
        h1 { font-size: 32px; color: var(--primary); margin-bottom: 15px; line-height: 1.2; font-weight: 800; }
        .meta-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; color: var(--light-text); font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 10px; flex-wrap: wrap; gap: 10px; }

        /* Imagem e Legenda */
        .main-photo-wrapper { width: 100%; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .main-photo { width: 100%; display: block; }
        .foto-legenda { margin: 10px 0 25px; padding-left: 12px; border-left: 4px solid var(--secondary); font-size: 13px; font-style: italic; color: var(--light-text); line-height: 1.4; }

        /* Corpo do Texto */
        .corpo-texto { font-size: 18px; line-height: 1.8; color: var(--text); text-align: justify; }
        .corpo-texto img { max-width: 100%; height: auto; border-radius: 10px; margin: 20px 0; }
        .corpo-texto a { color: var(--secondary); font-weight: bold; text-decoration: none; border-bottom: 1px solid var(--secondary); }

        /* Tags */
        .tags-container { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .tag-item { background: #eee; color: #555; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-right: 5px; display: inline-block; text-transform: lowercase; }
        body.dark-mode .tag-item { background: #333; color: #ccc; }

        /* Busca e Botões */
        .search-container { display: flex; align-items: center; border: 1.5px solid var(--secondary); border-radius: 25px; width: 38px; height: 38px; overflow: hidden; transition: 0.4s; }
        .search-container.active { width: 180px; }
        .search-input { border: none; background: transparent; outline: none; width: 0; font-size: 14px; transition: 0.4s; padding: 0; color: var(--text); }
        .search-container.active .search-input { width: 130px; padding: 0 10px; }
        .btn-search { background: none; border: none; cursor: pointer; color: var(--secondary); width: 32px; display: flex; align-items: center; justify-content: center; }

        /* Barra de Compartilhamento */
        .share-bar-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg); border-radius: 50px; display: none; gap: 20px; padding: 12px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; border: 1px solid #eee; }
        .share-bar-fixed a { color: var(--light-text); font-size: 22px; }
    </style>
</head>
<body>

<header>
    <button id="open-menu" style="background:none; border:none; font-size:22px; color:var(--secondary); cursor:pointer;"><i class="fas fa-bars"></i></button>
    <img src="3_20250925_005418_0002.png" style="height: 35px; cursor: pointer;" onclick="location.href='index.html'">
    <div style="display: flex; gap: 10px;">
        <div class="search-container" id="search-box">
            <input type="text" id="input-busca" class="search-input" placeholder="Pesquisar...">
            <button class="btn-search" id="btn-lupa"><i class="fas fa-search"></i></button>
        </div>
        <button id="dark-toggle" style="background:none; border:none; font-size:20px; color:var(--secondary);"><i class="far fa-moon"></i></button>
    </div>
</header>

<div id="menu-container"></div>

<main class="noticia-container" id="noticia-render">
    <div style="text-align:center; padding:100px; color:#888;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 30px;"></i>
        <p>Aguarde, preparando decolagem...</p>
    </div>
</main>

<div class="share-bar-fixed" id="share-bar">
    <a href="#" id="share-fb" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="#" id="share-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="javascript:void(0)" id="share-native"><i class="fas fa-share-alt"></i></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const idOuSlug = params.get('p') || params.get('id');

    function formatarDataExtenso(timestamp) {
        if (!timestamp) return "Data não informada";
        const data = timestamp.toDate();
        return data.toLocaleDateString('pt-BR', {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        });
    }

    async function carregar() {
        if (!idOuSlug) {
            document.getElementById('noticia-render').innerHTML = "Voo sem destino. Link inválido.";
            return;
        }

        try {
            let docFinal = null;
            const refDireta = doc(db, "noticias", idOuSlug);
            const snapDireto = await getDoc(refDireta);
            
            if (snapDireto.exists()) {
                docFinal = { id: snapDireto.id, data: snapDireto.data() };
            } else {
                const querySnapshot = await getDocs(collection(db, "noticias"));
                querySnapshot.forEach((docSnap) => {
                    if (docSnap.data().slug === idOuSlug) {
                        docFinal = { id: docSnap.id, data: docSnap.data() };
                    }
                });
            }

            if (docFinal) {
                exibirNoticia(docFinal);
            } else {
                document.getElementById('noticia-render').innerHTML = "<h2>Notícia não encontrada no hangar.</h2>";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('noticia-render').innerHTML = "Pane no sistema. Tente novamente.";
        }
    }

    function exibirNoticia(docObj) {
        const n = docObj.data;
        updateDoc(doc(db, "noticias", docObj.id), { cliques: increment(1) }).catch(()=>{});

        const legendaHtml = n.legenda ? `<div class="foto-legenda">${n.legenda}</div>` : "";
        const dataExtenso = formatarDataExtenso(n.data);
        const autorNome = n.autor || 'Miguel Barbosa';
        
        let tagsHtml = "";
        if (n.tags) {
            tagsHtml = `<div class="tags-container">` + 
                       n.tags.split(',').map(tag => `<span class="tag-item">#${tag.trim()}</span>`).join('') + 
                       `</div>`;
        }

        document.title = n.titulo + " | BrasilAviation";

        document.getElementById('noticia-render').innerHTML = `
            <div class="breadcrumb">Início / <span>${n.categoria || 'Geral'}</span></div>
            <h1>${n.titulo}</h1>
            
            <div class="meta-info">
                <span><i class="fas fa-user-edit"></i> Por <a href="perfil.html?nome=${encodeURIComponent(autorNome)}" style="color: inherit; text-decoration: none;"><b>${autorNome}</b></a></span>
                <span><i class="far fa-calendar-alt"></i> ${dataExtenso}</span>
            </div>

            <div class="main-photo-wrapper">
                <img src="${n.foto}" class="main-photo" alt="${n.titulo}">
            </div>
            ${legendaHtml}

            <div class="corpo-texto">
                ${n.conteudo}
            </div>

            ${tagsHtml}
        `;
        
        const linkAtual = window.location.href;
        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${encodeURIComponent(n.titulo)}%20${encodeURIComponent(linkAtual)}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(linkAtual)}`;
        document.getElementById('share-bar').style.display = 'flex';
    }

    carregar();

    const searchBox = document.getElementById('search-box');
    const inputBusca = document.getElementById('input-busca');
    document.getElementById('btn-lupa').onclick = (e) => {
        e.stopPropagation();
        if (!searchBox.classList.contains('active')) {
            searchBox.classList.add('active');
            inputBusca.focus();
        } else if (inputBusca.value.trim()) {
            window.location.href = `pesquisa.html?q=${encodeURIComponent(inputBusca.value)}`;
        }
    };

    const btnDark = document.getElementById('dark-toggle');
    if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
    btnDark.onclick = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode') ? 'active' : 'inactive');
    };
    
    fetch('menu.html').then(r => r.text()).then(html => {
        document.getElementById('menu-container').innerHTML = html;
        const menu = document.getElementById('side-menu');
        const openBtn = document.getElementById('open-menu');
        if(openBtn) openBtn.onclick = () => menu.classList.add('active');
    }).catch(()=>{});

    document.getElementById('share-native').onclick = () => {
        if (navigator.share) {
            navigator.share({
                title: document.title,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copiado!");
        }
    };
</script>
</body>
</html>
