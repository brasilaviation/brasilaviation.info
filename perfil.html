<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrasilAviation | Perfil do Autor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --bg: #f4f4f9; }
        body.dark-mode { --bg: #121212; --text: #eee; }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); transition: 0.3s; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; background: white; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }
        body.dark-mode header { background: #181818; border-color: #333; }

        .perfil-container { max-width: 800px; margin: 0 auto; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        
        .autor-header { 
            background: white; padding: 30px; border-radius: 20px; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        body.dark-mode .autor-header { background: #1e1e1e; color: #eee; }

        .autor-header img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--secondary); object-fit: cover; margin-bottom: 15px; }
        .autor-header h2 { margin: 0; color: var(--primary); font-size: 24px; }
        body.dark-mode .autor-header h2 { color: #fff; }
        
        .autor-header span { color: var(--secondary); font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .autor-header p { color: #666; margin-top: 15px; line-height: 1.6; font-size: 15px; }
        body.dark-mode .autor-header p { color: #bbb; }

        .stats { margin-top: 15px; font-size: 13px; color: #888; border-top: 1px solid #eee; padding-top: 10px; }

        .lista-titulo { font-size: 18px; color: var(--primary); margin-bottom: 20px; border-left: 5px solid var(--secondary); padding-left: 10px; }
        body.dark-mode .lista-titulo { color: #fff; }

        .news-item { 
            display: flex; gap: 15px; background: white; padding: 12px; 
            border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            cursor: pointer; transition: 0.2s;
        }
        body.dark-mode .news-item { background: #1e1e1e; }
        .news-item:hover { transform: translateY(-3px); }

        .news-photo img { width: 110px; height: 80px; border-radius: 10px; object-fit: cover; }
        .news-info h3 { font-size: 15px; margin: 0 0 5px 0; color: #222; line-height: 1.3; }
        body.dark-mode .news-info h3 { color: #eee; }
        .news-date { font-size: 11px; color: #888; }

        .btn-icon { background: none; border: none; font-size: 20px; color: var(--secondary); cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="btn-icon" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
    <img src="3_20250925_005418_0002.png" style="height: 30px; cursor: pointer;" onclick="location.href='index.html'">
    <button class="btn-icon" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
</header>

<main class="perfil-container">
    <div class="autor-header" id="header-autor">
        <i class="fas fa-circle-notch fa-spin"></i> Carregando perfil...
    </div>

    <h3 class="lista-titulo">Publicações do Autor</h3>
    <div id="lista-publicacoes"></div>
</main>

<div id="footer-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const nomeAutor = urlParams.get('nome');

    const dadosAutores = {
        'Miguel Barbosa': {
            cargo: 'Fundador & Editor-Chefe',
            bio: 'Idealizador do BrasilAviation.info, entusiasta de frotas e spotter. Focado em trazer a verdade técnica da aviação nacional.',
            foto: 'IMG_7814_edited.jpg'
        },
        'Henrique Saito': {
            cargo: 'Colunista & Redator',
            bio: 'Especialista em redação jornalística e cobertura de frotas internacionais e movimentações de longo curso.',
            foto: 'placeholder.jpg'
        },
        'Murilo': {
            cargo: 'Redator & Social Media',
            bio: 'Responsável pela cobertura de notícias de última hora e engajamento da comunidade aeronáutica.',
            foto: 'placeholder.jpg'
        }
    };

    async function carregarPerfil() {
        if(!nomeAutor) {
            document.getElementById('header-autor').innerHTML = "Autor não especificado.";
            return;
        }

        const info = dadosAutores[nomeAutor] || { 
            cargo: 'Colaborador', 
            bio: 'Membro da equipe BrasilAviation.info contribuindo para o crescimento da aviação.', 
            foto: 'placeholder.jpg' 
        };
        
        document.getElementById('header-autor').innerHTML = `
            <img src="${info.foto}" alt="${nomeAutor}">
            <h2>${nomeAutor}</h2>
            <span>${info.cargo}</span>
            <p>${info.bio}</p>
            <div class="stats" id="contador-posts">Buscando matérias...</div>
        `;

        try {
            const q = query(collection(db, "noticias"), where("autor", "==", nomeAutor));
            const snap = await getDocs(q);
            
            let posts = [];
            snap.forEach(d => {
                posts.push({ id: d.id, ...d.data() });
            });

            posts.sort((a, b) => {
                const dataA = a.data?.seconds || 0;
                const dataB = b.data?.seconds || 0;
                return dataB - dataA;
            });

            document.getElementById('contador-posts').innerText = `${posts.length} matérias publicadas no portal`;

            let html = "";
            if (posts.length > 0) {
                posts.forEach(n => {
                    const dataFmt = n.data ? new Date(n.data.seconds * 1000).toLocaleDateString('pt-BR', {day:'numeric', month:'long', year:'numeric'}) : "Data não disponível";
                    html += `
                        <article class="news-item" onclick="location.href='noticia.html?p=${n.slug || n.id}'">
                            <div class="news-photo"><img src="${n.foto}"></div>
                            <div class="news-info">
                                <h3>${n.titulo}</h3>
                                <span class="news-date"><i class="far fa-calendar-alt"></i> ${dataFmt}</span>
                            </div>
                        </article>`;
                });
            } else {
                html = "<p style='text-align:center; color:#888;'>Este autor ainda não possui publicações.</p>";
            }
            
            document.getElementById('lista-publicacoes').innerHTML = html;

        } catch (e) { 
            console.error(e); 
            document.getElementById('lista-publicacoes').innerHTML = "Erro ao carregar publicações.";
        }
    }

    // CARREGAR RODAPÉ E ATIVAR SEGREDO
    fetch('rodape.html').then(r => r.text()).then(h => {
        document.getElementById('footer-container').innerHTML = h;
        
        let secretClicks = 0;
        let secretTimer;
        const adminGate = document.getElementById('admin-gate');
        if(adminGate) {
            adminGate.onclick = () => {
                secretClicks++;
                clearTimeout(secretTimer);
                secretTimer = setTimeout(() => secretClicks = 0, 1500); 
                if(secretClicks === 4) window.location.href = 'admin.html';
            };
        }
    });

    carregarPerfil();

    if (localStorage.getItem('dark-mode') === 'active') document.body.classList.add('dark-mode');
</script>
</body>
</html>
