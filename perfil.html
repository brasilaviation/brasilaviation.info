<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css"> 
    <style>
        .perfil-container { max-width: 800px; margin: 30px auto; padding: 0 20px; min-height: 80vh; }
        
        .autor-header { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: var(--radius); 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .autor-header img { 
            width: 130px; height: 130px; 
            border-radius: 50%; 
            border: 4px solid var(--secondary); 
            object-fit: cover; 
            margin-bottom: 15px; 
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2);
        }
        
        .autor-header h2 { margin: 0; color: var(--primary); font-size: 26px; font-weight: 800; }
        body.dark-mode .autor-header h2 { color: #fff; }
        
        .autor-header .cargo { color: var(--secondary); font-weight: 700; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; display: block; margin-top: 5px; }
        .autor-header p { color: var(--text-muted); margin-top: 15px; line-height: 1.6; font-size: 16px; max-width: 600px; margin-left: auto; margin-right: auto; }

        .stats { margin-top: 20px; font-size: 14px; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 15px; font-weight: 500; }

        .lista-titulo { font-size: 18px; color: var(--text-main); margin-bottom: 20px; border-left: 5px solid var(--secondary); padding-left: 12px; font-weight: 800; }

        .author-news-list { display: flex; flex-direction: column; gap: 15px; }
        
        .news-item-mini { 
            display: flex; gap: 15px; background: var(--card); padding: 12px; 
            border-radius: 15px; border: 1px solid var(--border);
            cursor: pointer; transition: 0.3s; align-items: center;
        }
        .news-item-mini:hover { transform: translateX(5px); border-color: var(--secondary); }

        .news-item-mini img { width: 100px; height: 70px; border-radius: 10px; object-fit: cover; }
        .news-item-mini h3 { font-size: 15px; margin: 0; color: var(--text-main); line-height: 1.3; flex: 1; }
        .news-date-mini { font-size: 11px; color: var(--text-muted); display: block; margin-top: 4px; }
        
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }
    </style>
</head>
<body>

<div id="header-container"></div>
<div id="menu-container"></div>

<main class="perfil-container">
    <div class="autor-header" id="header-autor">
        <div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Preparando perfil do tripulante...</div>
    </div>

    <h3 class="lista-titulo">Matérias Publicadas</h3>
    <div id="lista-publicacoes" class="author-news-list"></div>
</main>

<div id="footer-container"></div>

<script src="/loader.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const nomeAutor = urlParams.get('nome');

    const dadosAutores = {
        'Miguel Barbosa': {
            cargo: 'Fundador & Editor-Chefe',
            bio: 'Idealizador do BrasilAviation.info, entusiasta de frotas e spotter. Focado em trazer a verdade técnica da aviação nacional.',
            foto: 'IMG_7814_edited.jpg'
        },
        'Henrique Saito': {
            cargo: 'Colunista & Redator',
            bio: 'Especialista em redação jornalística e cobertura de frotas internacionais e movimentações de longo curso.',
            foto: 'placeholder.jpg'
        },
        'Murilo': {
            cargo: 'Redator & Social Media',
            bio: 'Responsável pela cobertura de notícias de última hora e engajamento da comunidade aeronáutica.',
            foto: 'placeholder.jpg'
        }
        'Murilo': {
            cargo: 'Redator & Social Media',
            bio: 'Responsável pela cobertura de notícias de última hora e engajamento da comunidade aeronáutica.',
            foto: 'placeholder.jpg'
    };

    async function carregarPerfil() {
        if(!nomeAutor) {
            document.getElementById('header-autor').innerHTML = "Autor não selecionado.";
            return;
        }

        const info = dadosAutores[nomeAutor] || { 
            cargo: 'Colaborador', 
            bio: 'Membro da equipe BrasilAviation.info contribuindo para o crescimento do portal.', 
            foto: 'placeholder.jpg' 
        };
        
        document.getElementById('header-autor').innerHTML = `
            <img src="${info.foto}" alt="${nomeAutor}">
            <h2>${nomeAutor}</h2>
            <span class="cargo">${info.cargo}</span>
            <p>${info.bio}</p>
            <div class="stats" id="contador-posts"><i class="fas fa-sync fa-spin"></i> Contando publicações...</div>
        `;

        try {
            const q = query(collection(db, "noticias"), where("autor", "==", nomeAutor));
            const snap = await getDocs(q);
            
            let posts = [];
            snap.forEach(d => {
                posts.push({ id: d.id, ...d.data() });
            });

            posts.sort((a, b) => (b.data?.seconds || 0) - (a.data?.seconds || 0));

            document.getElementById('contador-posts').innerHTML = `<i class="fas fa-pen-nib"></i> ${posts.length} matérias publicadas no portal`;

            let html = "";
            if (posts.length > 0) {
                posts.forEach(n => {
                    const dataFmt = n.data ? new Date(n.data.seconds * 1000).toLocaleDateString('pt-BR', {day:'numeric', month:'short'}) : "";
                    const linkUrl = n.slug ? `/noticia/${n.slug}` : `/noticia.html?id=${n.id}`;
                    
                    html += `
                        <article class="news-item-mini" onclick="location.href='${linkUrl}'">
                            <img src="${n.foto}" alt="Miniatura">
                            <div>
                                <h3>${n.titulo}</h3>
                                <span class="news-date-mini"><i class="far fa-calendar-alt"></i> ${dataFmt}</span>
                            </div>
                        </article>`;
                });
            } else {
                html = "<p style='text-align:center; color:var(--text-muted);'>Nenhuma publicação encontrada para este autor.</p>";
            }
            
            document.getElementById('lista-publicacoes').innerHTML = html;

        } catch (e) { 
            console.error(e); 
            document.getElementById('lista-publicacoes').innerHTML = "Erro ao conectar com o hangar de dados.";
        }
    }

    carregarPerfil();
</script>
</body>
</html>
