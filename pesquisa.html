<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa | BrasilAviation.info</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; font-family: sans-serif; }
        .pesquisa-container { max-width: 800px; margin: 0 auto; padding: 20px; flex: 1; width: 100%; }
        .termo-busca { color: #2e7d32; font-style: italic; }
        .resultado-item { display: flex; gap: 15px; margin-bottom: 20px; cursor: pointer; border-bottom: 1px solid #eee; padding-bottom: 15px; transition: 0.3s; }
        .resultado-item:hover { opacity: 0.7; }
        .resultado-item img { width: 100px; height: 70px; border-radius: 8px; object-fit: cover; }
        .resultado-info h3 { font-size: 16px; margin: 0 0 5px 0; color: var(--text); }
        body.dark-mode .resultado-item { border-color: #333; }
    </style>
</head>
<body>

<main class="pesquisa-container">
    <h2>Resultados para: <span id="label-busca" class="termo-busca">...</span></h2>
    <hr style="opacity: 0.1; margin: 15px 0;">
    <div id="lista-resultados">
        <p style="text-align:center; color:#888;">Buscando nas nuvens...</p>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDm_UDs4KE7j8BuGdw9kClsSrKwxLWbt7g",
        authDomain: "braviation3.firebaseapp.com",
        projectId: "braviation3",
        storageBucket: "braviation3.firebasestorage.app",
        messagingSenderId: "979009087877",
        appId: "1:979009087877:web:490bdc36da545d56b87cec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function realizarBusca() {
        const params = new URLSearchParams(window.location.search);
        const termo = params.get('q')?.toLowerCase() || "";
        document.getElementById('label-busca').innerText = termo;

        if (!termo) {
            document.getElementById('lista-resultados').innerHTML = "<p>Digite algo para pesquisar.</p>";
            return;
        }

        try {
            const q = query(collection(db, "noticias"), orderBy("data", "desc"));
            const snap = await getDocs(q);
            let html = "";
            let encontrados = 0;

            snap.forEach(doc => {
                const n = doc.data();
                const titulo = n.titulo.toLowerCase();
                
                if (titulo.includes(termo)) {
                    encontrados++;
                    // LINK LIMPO: /noticia?id=...
                    html += `
                        <div class="resultado-item" onclick="location.href='/noticia?id=${doc.id}'">
                            <img src="${n.foto}">
                            <div class="resultado-info">
                                <h3>${n.titulo}</h3>
                                <p style="font-size:12px; color:#888;">${n.cat || 'Geral'} | ${n.data.toDate().toLocaleDateString()}</p>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('lista-resultados').innerHTML = encontrados > 0 ? html : "<p>Nenhuma notícia encontrada.</p>";
        } catch (e) {
            document.getElementById('lista-resultados').innerHTML = "Erro na busca.";
        }
    }
    realizarBusca();
</script>
</body>
</html>
