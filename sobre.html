<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nós | BrasilAviation.info</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    
    <style>
        .container { max-width: 800px; margin: 40px auto; padding: 0 15px; min-height: 80vh; display: flex; align-items: center; justify-content: center; }
        
        .maintenance-card { 
            background: var(--card); 
            padding: 50px 35px; 
            border-radius: var(--radius); 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center;
            width: 100%;
        }
        
        .maintenance-card i { 
            font-size: 50px; 
            color: var(--secondary); 
            margin-bottom: 20px; 
        }

        .maintenance-card h1 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--primary); 
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        body.dark-mode .maintenance-card h1 { color: #fff; }

        .maintenance-card p { 
            font-size: 1.1rem; 
            color: var(--text-main); 
            opacity: 0.8;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            background: rgba(26, 35, 126, 0.1);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 20px;
            border: 1px solid var(--primary);
        }
        body.dark-mode .status-badge { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        @media (max-width: 600px) {
            .maintenance-card { padding: 30px 20px; }
            .maintenance-card h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div id="header-container"></div>
<div id="menu-container"></div>

<main class="container">
    <article class="maintenance-card">
        <i class="fas fa-tools fa-bounce"></i>
        <h1>Check Pesado em Andamento</h1>
        <p>Estamos realizando uma manutenção profunda nesta página para garantir que você saiba de nossa história.</p>
        
        <div class="status-badge">
            <i class="fas fa-clock"></i> Em manutenção
        </div>
    </article>
</main>

<div id="footer-container"></div>

<script src="/loader.js"></script>

</body>
</html>
