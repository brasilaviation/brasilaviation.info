<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termos de Uso | BrasilAviation.info</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --bg: #f4f4f9; --text: #333; --card: #ffffff; }
        body.dark-mode { --bg: #121212; --text: #eee; --primary: #fff; --card: #1e1e1e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; }
        .container { max-width: 850px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        .legal-card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 15px; margin-bottom: 30px; font-size: 28px; text-transform: uppercase; }
        h2 { color: var(--secondary); margin-top: 35px; font-size: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        .update-date { font-size: 13px; color: var(--secondary); font-weight: bold; margin-top: 50px; text-align: center; border-top: 1px dashed #ccc; padding-top: 20px; }
    </style>
</head>
<body>
<div id="header-container"></div>
<main class="container">
    <article class="legal-card">
        <h1>Termos e Condições de Uso</h1>
        <p>Ao acessar e utilizar o portal <strong>BrasilAviation.info</strong>, o usuário concorda em cumprir os presentes Termos...</p>
        <h2>1. Aceitação dos Termos</h2>
        <p>Caso você não concorde, interrompa o uso do site imediatamente.</p>
        <div class="update-date">Última atualização: 24 de abril de 2026</div>
    </article>
</main>
<div id="footer-container"></div>
<script src="/loader.js"></script>
</body>
</html>
